<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.ico">
<title>Stream Grid</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #101215; color: #e6e8eb; }
  body { font: 13px/1.4 system-ui, "Segoe UI", sans-serif; display: flex; flex-direction: column; }
  header {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    padding: 8px 12px; background: #16181c; border-bottom: 1px solid #2e333b;
  }
  header .title { font-weight: 600; margin-right: 8px; }
  header input {
    width: 280px; padding: 6px 10px; background: #1d2026; color: #e6e8eb;
    border: 1px solid #2e333b; border-radius: 8px; font: inherit;
  }
  header input:focus { outline: none; border-color: #4f9cf9; }
  header button {
    padding: 6px 12px; background: #2b5a94; color: #e6e8eb; border: none;
    border-radius: 8px; font: inherit; cursor: pointer;
  }
  header button:hover { background: #4f9cf9; }
  header .hint { color: #9aa1ab; font-size: 12px; }
  header .spacer { flex: 1; }
  header .ghost { background: #1d2026; border: 1px solid #2e333b; color: #9aa1ab; }
  header .ghost:hover { background: #242830; color: #e6e8eb; }
  /* Second header row: tailnet discovery. Only shown inside the app's Watch
     window - the probing runs natively (tailscale CLI), results are pushed in. */
  #finder { flex-basis: 100%; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  /* Restore pill shown while the bar is hidden. Top-center: matches where the
     bar lives; the tile corners still belong to the streams' own controls.
     Invisible until the mouse is over the window, like the viewer's hover
     controls. */
  #showBar {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 10; height: 30px; padding: 0 16px;
    display: none; align-items: center; justify-content: center; gap: 6px;
    background: rgba(22, 24, 28, .75); border: 1px solid #2e333b; border-radius: 999px;
    font-size: 12px; color: #9aa1ab; cursor: pointer; opacity: 0; user-select: none;
    transition: opacity .25s;
  }
  body:hover #showBar { opacity: .55; }
  body:hover #showBar:hover { opacity: 1; color: #e6e8eb; }
  #grid {
    flex: 1; display: grid; gap: 6px; padding: 6px; min-height: 0;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 560px), 1fr));
    grid-auto-rows: 1fr;
  }
  .tile {
    display: flex; flex-direction: column; min-height: 240px;
    background: #16181c; border: 1px solid #2e333b; border-radius: 10px; overflow: hidden;
  }
  .tile .bar {
    display: flex; align-items: center; gap: 8px; padding: 4px 10px;
    background: #1d2026; font-size: 12px; color: #9aa1ab;
  }
  .tile .dot { width: 8px; height: 8px; border-radius: 50%; background: #e05555; flex: none; }
  .tile.live .dot { background: #58c472; }
  .tile .name { font-weight: 600; color: #e6e8eb; }
  .tile .spacer { flex: 1; }
  .tile .bar a, .tile .bar button {
    background: none; border: none; color: #9aa1ab; cursor: pointer;
    font: inherit; text-decoration: none; padding: 2px 6px;
  }
  .tile .bar a:hover, .tile .bar button:hover { color: #e6e8eb; }
  .tile iframe { flex: 1; width: 100%; border: none; background: #000; }
  #empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #9aa1ab; text-align: center; line-height: 2;
  }
</style>
</head>
<body>
<header>
  <span class="title">Stream Grid</span>
  <input id="urlInput" placeholder="paste a friend's stream link (http://100.x.y.z:8093/)" spellcheck="false">
  <button id="addBtn">Add</button>
  <span class="spacer"></span>
  <button id="layoutBtn" class="ghost" title="Switch between side-by-side and stacked streams">Stack vertically</button>
  <button id="hideBtn" class="ghost" title="Hide this bar">Hide bar</button>
  <button id="chimeBtn" class="ghost" title="Go-live chime on/off">&#128276;</button>
  <div id="finder">
    <button id="findBtn" class="ghost" title="Search the tailnet for live streams">&#8635; Find streams</button>
    <span id="findStatus" class="hint"></span>
  </div>
</header>
<div id="showBar" title="Show the add-stream bar">&#9776; add streams</div>
<div id="grid"></div>
<div id="empty">No streams added yet.<br>Paste each stream link above once and it will stick around.</div>

<script>
"use strict";
const grid = document.getElementById("grid");
const empty = document.getElementById("empty");
const urlInput = document.getElementById("urlInput");
const KEY = "spectari_grid_urls";
const LAYOUT_KEY = "spectari_grid_layout";
const HIDEBAR_KEY = "spectari_grid_hidebar";

// Keep settings for same-origin browser viewers after the storage-key rename.
// Each old value is copied once only when its replacement is still absent.
const LEGACY_KEY_PREFIX = "stream" + "host_grid_";
const STORAGE_KEY_MIGRATIONS = [
  [LEGACY_KEY_PREFIX + "urls", KEY],
  [LEGACY_KEY_PREFIX + "layout", LAYOUT_KEY],
  [LEGACY_KEY_PREFIX + "hidebar", HIDEBAR_KEY],
];
for (const [oldKey, newKey] of STORAGE_KEY_MIGRATIONS) {
  try {
    if (localStorage.getItem(newKey) !== null) continue;
    const value = localStorage.getItem(oldKey);
    if (value !== null) localStorage.setItem(newKey, value);
  } catch (_) { /* storage unavailable: use defaults */ }
}

function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function save(urls) { localStorage.setItem(KEY, JSON.stringify(urls)); }

// The Watch window's background discovery requests this chime for newly-live
// streams that are not already in the grid. The header bell is its only toggle;
// absent = on, preserving the existing persisted setting.
const CHIME_KEY = "chimeOn";
function chimeEnabled() { return localStorage.getItem(CHIME_KEY) !== "0"; }
let audioCtx = null;
function playChime() {
  if (!chimeEnabled()) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
    const now = audioCtx.currentTime;
    // Two soft sine notes a fifth apart (C5 then G5), quick attack, gentle decay,
    // low peak so it reads as a polite tap rather than an alert. Under 0.6s total.
    for (const [freq, at] of [[523.25, 0], [783.99, 0.12]]) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      const start = now + at;
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.11, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.35);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    }
  } catch (_) { /* autoplay blocked or no Web Audio: stay silent, no fallback */ }
}
const chimeBtn = document.getElementById("chimeBtn");
function syncChimeBtn() { chimeBtn.textContent = chimeEnabled() ? "🔔" : "🔕"; }
chimeBtn.onclick = () => {
  localStorage.setItem(CHIME_KEY, chimeEnabled() ? "0" : "1");
  syncChimeBtn();
};
syncChimeBtn();
window.playNotificationChime = playChime;

function normalize(u) {
  u = u.trim();
  if (!u) return null;
  if (!/^https?:\/\//i.test(u)) u = "http://" + u;
  // Keep the viewer key (?k=) - the stream is unwatchable without it.
  try {
    const parsed = new URL(u);
    const k = parsed.searchParams.get("k");
    return parsed.origin + "/" + (k ? "?k=" + encodeURIComponent(k) : "");
  } catch { return null; }
}

function updateGridVisibility() {
  const hasTiles = grid.children.length > 0;
  empty.style.display = hasTiles ? "none" : "flex";
  grid.style.display = hasTiles ? "grid" : "none";
}

function createTile(url) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.dataset.url = url;

  const bar = document.createElement("div");
  bar.className = "bar";
  bar.innerHTML = `<span class="dot"></span><span class="name">…</span><span class="state">connecting</span><span class="spacer"></span>`;

  const moveL = document.createElement("button");
  moveL.textContent = "◀";
  moveL.title = "Move earlier (left/up)";
  moveL.onclick = () => move(tile, -1);
  bar.appendChild(moveL);

  const moveR = document.createElement("button");
  moveR.textContent = "▶";
  moveR.title = "Move later (right/down)";
  moveR.onclick = () => move(tile, +1);
  bar.appendChild(moveR);

  const open = document.createElement("a");
  open.className = "open";
  open.textContent = "open ↗";
  open.href = url;
  open.target = "_blank";
  open.rel = "noopener noreferrer";
  bar.appendChild(open);

  const remove = document.createElement("button");
  remove.textContent = "✕";
  remove.title = "Remove";
  remove.onclick = () => removeTile(tile);
  bar.appendChild(remove);

  // The iframe is NOT embedded here - pollTile() adds it only once the
  // endpoint validates as a Spectari. Until then the tile shows just its bar.
  tile.appendChild(bar);
  return tile;
}

function removeTile(tile) {
  if (tile.parentElement !== grid) return;
  const url = tile.dataset.url;
  save(load().filter(u => u !== url));
  tile.remove();
  updateGridVisibility();
  fixSpans();
}

function render() {
  const urls = load();
  grid.replaceChildren(...urls.map(createTile));
  updateGridVisibility();
  fixSpans();
  poll();
}

// With an odd tile count the auto-fit grid leaves a dead cell (3 streams in a
// 2-wide grid = one empty quarter). Widen the last tile to fill its row.
// Clamp the column count to the tile count: auto-fit creates more (collapsed)
// tracks than tiles on wide windows, and counting those made 2 tiles split
// 1/3 + 2/3 on a monitor-width window.
function fixSpans() {
  const tiles = grid.children;
  for (const t of tiles) t.style.gridColumn = "";
  if (!tiles.length || stacked()) return;
  const tracks = getComputedStyle(grid).gridTemplateColumns.split(" ").length;
  const cols = Math.min(tracks, tiles.length);
  const leftover = tiles.length % cols;
  if (cols > 1 && leftover !== 0)
    tiles[tiles.length - 1].style.gridColumn = `span ${cols - leftover + 1}`;
}
window.addEventListener("resize", fixSpans);

// Layout: side-by-side auto-fit (default) or one column stacked vertically.
const layoutBtn = document.getElementById("layoutBtn");
function stacked() { return localStorage.getItem(LAYOUT_KEY) === "stack"; }
function applyLayout() {
  grid.style.gridTemplateColumns = stacked() ? "1fr" : "";
  layoutBtn.textContent = stacked() ? "Side by side" : "Stack vertically";
  fixSpans();
}
layoutBtn.onclick = () => {
  localStorage.setItem(LAYOUT_KEY, stacked() ? "auto" : "stack");
  applyLayout();
};
applyLayout();

// One-click add used by the app's Find streams panel (and reusable from the
// console). Dedupes by host: a re-add with a fresh key replaces the old entry.
window.addStream = function (u) {
  const n = normalize(u);
  if (!n) return false;
  const urls = load();
  const origin = new URL(n).origin;
  const i = urls.findIndex(x => { try { return new URL(x).origin === origin; } catch { return false; } });
  if (i >= 0) {
    if (urls[i] === n) return true;
    urls[i] = n;
    save(urls);
    const tile = [...grid.children].find(t => {
      try { return new URL(t.dataset.url).origin === origin; } catch { return false; }
    });
    if (tile) {
      tile.dataset.url = n;
      tile.querySelector("a.open").href = n;
      const frame = tile.querySelector("iframe");
      if (frame && frame.getAttribute("src") !== n) frame.src = n;
      tile.dataset.down = 0;
      pollTile(tile);
    } else {
      const added = createTile(n);
      grid.appendChild(added);
      updateGridVisibility();
      fixSpans();
      pollTile(added);
    }
  } else {
    urls.push(n);
    save(urls);
    const tile = createTile(n);
    grid.appendChild(tile);
    updateGridVisibility();
    fixSpans();
    pollTile(tile);
  }
  return true;
};

// Embed a tile's player iframe once its host has validated as a Spectari.
// Sandboxed to allow-scripts (MSE playback JS) + allow-same-origin (its WebSocket
// to /ws and fetch to /api/stats must stay same-origin to the remote host);
// every other capability - top-navigation, popups, downloads, form submits - is
// withheld by leaving the rest of the sandbox tokens off.
function embed(tile) {
  if (tile.querySelector("iframe")) return;
  const frame = document.createElement("iframe");
  frame.setAttribute("sandbox", "allow-scripts allow-same-origin");
  frame.allow = "autoplay; fullscreen";
  frame.allowFullscreen = true;
  frame.src = tile.dataset.url;
  tile.appendChild(frame);
}

const pollGenerations = new WeakMap();
function tileIsCurrent(tile, url, generation) {
  return tile.parentElement === grid
    && tile.dataset.url === url
    && pollGenerations.get(tile) === generation;
}

function pollTile(tile) {
  if (tile.parentElement !== grid) return;
  const url = tile.dataset.url;
  const generation = (pollGenerations.get(tile) || 0) + 1;
  pollGenerations.set(tile, generation);
  fetch(new URL("api/stats", url), { signal: AbortSignal.timeout(3000) })
    .then(r => tileIsCurrent(tile, url, generation) ? r.json() : null)
    .then(s => {
      if (!tileIsCurrent(tile, url, generation)) return;
      // "Responded" is not "live", and a bare 200 from some other server on
      // this port is not a Spectari at all - require the host's own state
      // field before trusting the endpoint enough to embed it.
      if (typeof s.state !== "string") throw new Error("not a spectari");
      const live = s.state === "live";
      tile.classList.toggle("live", live);
      tile.querySelector(".name").textContent = s.name || url;
      tile.querySelector(".state").textContent = live
        ? `${s.sourceFps} fps · ${s.viewers} watching`
        : s.state === "idle" ? "not streaming yet"
        : (s.state || "not streaming");
      // Hosts hand the current viewer key to tailnet/local callers; a restart
      // rotates it, so refresh the saved link when it changes. addStream updates
      // only this tile and immediately polls its new URL.
      if (s.key && new URL(url).searchParams.get("k") !== s.key) {
        window.addStream(new URL(url).origin + "/?k=" + encodeURIComponent(s.key));
        return;
      }
      // Validated (live OR the idle holding page, which is meant to embed):
      // add the iframe if it isn't there yet. This is both the first-embed
      // path and the recovery path for a host that was unreachable - its tile
      // carried no iframe - and has come back. A fresh embed is clean, so
      // clear the missed-poll counter that would otherwise force a reload.
      if (!tile.querySelector("iframe")) {
        embed(tile);
        tile.dataset.down = 0;
      }
      // An already-embedded iframe that sat on the browser's own error page
      // (host was down when it loaded, no script of ours runs there) gets
      // reloaded when the host returns. Two missed polls required so a single
      // stats timeout on a congested link can't restart healthy playback (the
      // key check above already covers restarts, but not --no-key or same-key).
      else if (live && +tile.dataset.down >= 2)
        tile.querySelector("iframe").src = url;
      if (live) tile.dataset.down = 0;
    })
    .catch(() => {
      if (!tileIsCurrent(tile, url, generation)) return;
      tile.dataset.down = (+tile.dataset.down || 0) + 1;
      tile.classList.remove("live");
      if (tile.querySelector(".name").textContent === "…")
        tile.querySelector(".name").textContent = url.replace(/^https?:\/\//, "");
      tile.querySelector(".state").textContent = "offline";
    });
}

function poll() {
  for (const tile of grid.children) {
    pollTile(tile);
  }
}
setInterval(poll, 5000);

function move(tile, dir) {
  if (tile.parentElement !== grid) return;
  const url = tile.dataset.url;
  const urls = load();
  const i = urls.indexOf(url);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= urls.length) return;
  const targetUrl = urls[j];
  const target = [...grid.children].find(t => t.dataset.url === targetUrl);
  if (!target) return;
  [urls[i], urls[j]] = [urls[j], urls[i]];
  save(urls);
  if (dir < 0) grid.insertBefore(tile, target);
  else grid.insertBefore(target, tile);
  fixSpans();
}

// The add-stream bar can be tucked away while watching; the faint chip
// top-right brings it back. Remembered per browser like the stream list.
const headerEl = document.querySelector("header");
const showBar = document.getElementById("showBar");
function applyBarVisibility() {
  const hidden = localStorage.getItem(HIDEBAR_KEY) === "1";
  headerEl.style.display = hidden ? "none" : "flex";
  showBar.style.display = hidden ? "flex" : "none";
  fixSpans();
}
document.getElementById("hideBtn").onclick = () => { localStorage.setItem(HIDEBAR_KEY, "1"); applyBarVisibility(); };
showBar.onclick = () => { localStorage.setItem(HIDEBAR_KEY, "0"); applyBarVisibility(); };
applyBarVisibility();

// Find streams row: discovery runs in the app (it needs the tailscale CLI),
// so the row only exists inside the Watch window's WebView2. The button asks
// the host to search; the host pushes results back via setFoundStreams.
const finder = document.getElementById("finder");
const findStatus = document.getElementById("findStatus");
if (window.chrome?.webview) {
  document.getElementById("findBtn").onclick = () =>
    window.chrome.webview.postMessage({ find: true });
} else {
  finder.style.display = "none";
}
window.setFoundStreams = function (streams, status) {
  for (const b of finder.querySelectorAll("button.found")) b.remove();
  for (const s of streams) {
    const b = document.createElement("button");
    b.className = "ghost found";
    b.textContent = "+ " + s.name;
    b.title = `${s.peer} · ${s.viewers} watching · click to add to the grid`;
    b.onclick = () => window.addStream(s.url);
    finder.appendChild(b);
  }
  findStatus.textContent = status || "";
};
window.getWatchedOrigins = function () {
  const origins = [];
  for (const tile of grid.children) {
    try { origins.push(new URL(tile.dataset.url).origin); } catch (_) {}
  }
  return origins;
};

document.getElementById("addBtn").onclick = add;
urlInput.addEventListener("keydown", e => { if (e.key === "Enter") add(); });
function add() {
  if (window.addStream(urlInput.value)) urlInput.value = "";
}

render();
</script>
</body>
</html>
